<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
:root{--p:#204989;--pd:#163266;--pl:#2d5eaa;--a1:#3BD77E;--a2:#83EDA3;--w:#fff;--g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g400:#94a3b8;--g600:#475569;--g800:#1e293b;--danger:#ef4444;--warn:#f59e0b;--rm:12px;--rmd:16px;--rl:24px;--rxl:32px;--s1:0 2px 8px rgba(32,73,137,.08);--s2:0 4px 20px rgba(32,73,137,.14);--s3:0 8px 40px rgba(32,73,137,.2)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;overflow-x:hidden;max-width:430px;margin:0 auto}
.screen{display:none;min-height:100vh;flex-direction:column}.screen.active{display:flex}
#splash{background:linear-gradient(160deg,var(--pd) 0%,var(--p) 55%,var(--pl) 100%);align-items:center;justify-content:center;flex-direction:column;position:relative;overflow:hidden}
.sb{position:absolute;inset:0}.sc{position:absolute;border-radius:50%;opacity:.07}
.sc1{width:420px;height:420px;background:var(--a1);top:-120px;right:-100px}
.sc2{width:320px;height:320px;background:var(--a2);bottom:-100px;left:-80px}
.splash-inner{position:relative;z-index:1;text-align:center;padding:2rem;width:100%;max-width:360px}
.ss{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:2.5rem}
.pl-label{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:12px}
.pcards{display:flex;flex-direction:column;gap:10px;width:100%}
.pcard{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:var(--rmd);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;backdrop-filter:blur(12px)}
.pcard:active{transform:scale(.97);background:rgba(255,255,255,.18)}
.pi{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pi-c{background:rgba(59,215,126,.2)}.pi-r{background:rgba(255,255,255,.15)}
.pinfo{flex:1;text-align:left}.pnome{font-size:14px;font-weight:600;color:#fff}.pdesc{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}.parr{color:rgba(255,255,255,.35);font-size:18px}
.hdr{background:var(--p);padding:52px 20px 20px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;width:220px;height:220px;border-radius:50%;background:rgba(59,215,126,.1);top:-70px;right:-50px}
.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative;z-index:1}
.hback{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.12);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:20px;display:none}
.hback.visible{display:flex}
.hnotif{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.12);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.ndot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:var(--a1);border-radius:50%;border:2px solid var(--p)}
.hgreet{position:relative;z-index:1}
.hname{font-family:'Plus Jakarta Sans',sans-serif;font-size:19px;font-weight:700;color:#fff;margin-bottom:2px}
.hsub{font-size:12px;color:rgba(255,255,255,.55)}
.hbadge{display:inline-flex;align-items:center;gap:5px;background:rgba(59,215,126,.18);border:1px solid rgba(59,215,126,.28);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;color:var(--a1);margin-top:8px}
.subscreen{display:none;position:fixed;inset:0;background:var(--g50);z-index:200;max-width:430px;margin:0 auto;overflow-y:auto}
.subscreen.active{display:block}
.sub-header{background:var(--p);padding:52px 20px 16px;display:flex;align-items:center;gap:12px}
.sub-back{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sub-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;color:#fff}
.sub-body{padding:16px 15px 90px}
.body{flex:1;padding:18px 15px 110px;overflow-y:auto}.body::-webkit-scrollbar{width:0}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--g100);display:flex;padding:10px 6px calc(16px + env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(32,73,137,.07)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 3px;cursor:pointer;border-radius:11px;transition:all .2s;border:none;background:none}
.ni.active{background:rgba(32,73,137,.07)}.ni-icon{font-size:19px;line-height:1}
.ni-lbl{font-size:9px;font-weight:600;letter-spacing:.3px;color:var(--g400)}.ni.active .ni-lbl{color:var(--p)}
.slbl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--g400);margin-bottom:11px;margin-top:2px}
.card{background:#fff;border-radius:var(--rl);padding:16px;margin-bottom:14px;box-shadow:var(--s1);border:1px solid var(--g100)}
.ctitle{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--g400);margin-bottom:11px}
.srow{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--g100);cursor:pointer}.srow:last-child{border-bottom:none}
.sico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ig{background:rgba(59,215,126,.1)}.ib{background:rgba(32,73,137,.08)}.io{background:rgba(245,158,11,.1)}.ir{background:rgba(239,68,68,.09)}
.sinfo{flex:1}.sname{font-size:13px;font-weight:500;color:var(--g800)}.sval{font-size:11px;color:var(--g400);margin-top:1px}
.chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}
.cg{background:rgba(59,215,126,.13);color:#16a34a}.co{background:rgba(245,158,11,.11);color:#d97706}.cr{background:rgba(239,68,68,.09);color:#dc2626}.cb{background:rgba(32,73,137,.09);color:var(--p)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}.agrid.c1{grid-template-columns:1fr}
.acard{background:#fff;border-radius:var(--rmd);padding:15px 13px;cursor:pointer;transition:all .2s;box-shadow:var(--s1);border:1px solid var(--g100);display:flex;flex-direction:column;gap:9px}
.acard:active{transform:scale(.97)}
.acard.feat{background:linear-gradient(135deg,var(--p),var(--pl));border-color:transparent;grid-column:span 2}
.acard.feat2{background:linear-gradient(135deg,var(--pd),var(--p));border-color:transparent;grid-column:span 2}
.acard.acc{background:linear-gradient(135deg,#16a34a,var(--a1));border-color:transparent}
.aic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px}
.aip{background:rgba(32,73,137,.09)}.aia{background:rgba(59,215,126,.14)}.aiw{background:rgba(255,255,255,.15)}.aio{background:rgba(245,158,11,.09)}.aipu{background:rgba(139,92,246,.09)}.air{background:rgba(239,68,68,.09)}.ait{background:rgba(20,184,166,.09)}.aiwp{background:rgba(37,211,102,.12)}
.atitle{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:var(--g800);line-height:1.3}.asub{font-size:10px;color:var(--g400);margin-top:1px}
.acard.feat .atitle,.acard.feat .asub,.acard.feat2 .atitle,.acard.feat2 .asub{color:#fff}
.acard.feat .asub,.acard.feat2 .asub{color:rgba(255,255,255,.65)}
.acard.acc .atitle,.acard.acc .asub{color:#fff}.acard.acc .asub{color:rgba(255,255,255,.7)}
.mcard{background:linear-gradient(135deg,var(--p),var(--pl));border-radius:var(--rl);padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.mcard::after{content:'';position:absolute;width:110px;height:110px;border-radius:50%;background:rgba(59,215,126,.13);bottom:-28px;right:-18px}
.mctitle{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:3px}
.mcsub{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:14px}
.mopts{display:flex;gap:7px;flex-wrap:wrap;position:relative;z-index:1}
.mopt{background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:7px 13px;font-size:12px;font-weight:500;color:#fff;cursor:pointer;transition:all .2s}
.mopt.sel{background:var(--a1);border-color:var(--a1);color:var(--pd);font-weight:700}
.pend-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--g100)}.pend-item:last-child{border-bottom:none}
.pend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pend-info{flex:1}.pend-titulo{font-size:13px;font-weight:500;color:var(--g800)}.pend-sub{font-size:11px;color:var(--g400);margin-top:1px}
.cart-wrap{padding:0 0 14px}
.cart{background:linear-gradient(135deg,var(--pd) 0%,var(--p) 60%,var(--pl) 100%);border-radius:var(--rxl);padding:22px 28px;position:relative;overflow:hidden;box-shadow:var(--s3);width:100%;aspect-ratio:1.75/1}
.cart::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;border:40px solid rgba(59,215,126,.08);top:-60px;right:-60px}
.cchip{width:36px;height:26px;background:linear-gradient(135deg,#d4af37,#f0d060);border-radius:5px;margin-bottom:20px;position:relative;z-index:1}
.cnome{font-family:'Plus Jakarta Sans',sans-serif;font-size:19px;font-weight:700;color:#fff;margin-bottom:2px;position:relative;z-index:1}
.cemp{font-size:12px;color:rgba(255,255,255,.55);position:relative;z-index:1;margin-bottom:24px}
.cbot{display:flex;justify-content:space-between;align-items:flex-end;position:relative;z-index:1}
.cil{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:2px}
.civ{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;color:#fff}
.clogo{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:800;color:var(--a1);text-align:right;line-height:1.3}
.bitem{background:#fff;border-radius:var(--rmd);padding:13px;margin-bottom:7px;display:flex;align-items:center;gap:11px;box-shadow:var(--s1);border:1px solid var(--g100);cursor:pointer;transition:all .2s}.bitem:active{transform:scale(.98)}
.bico{width:42px;height:42px;border-radius:11px;background:rgba(32,73,137,.07);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.binfo{flex:1}.bnome{font-size:13px;font-weight:600;color:var(--g800)}.btipo{font-size:11px;color:var(--g400);margin-top:1px}.bdist{font-size:11px;font-weight:700;color:var(--p)}
.dcard{background:#fff;border-radius:var(--rl);padding:18px;margin-bottom:12px;box-shadow:var(--s1);border:1px solid var(--g100)}
.dtitle{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;color:var(--g800);margin-bottom:4px}
.dsub{font-size:12px;color:var(--g400);line-height:1.5;margin-bottom:14px}
.dopts{display:flex;flex-direction:column;gap:7px}
.dopt{padding:11px 13px;border-radius:var(--rm);background:var(--g50);border:1.5px solid var(--g200);cursor:pointer;font-size:13px;font-weight:500;color:var(--g600);text-align:left;transition:all .2s;display:flex;align-items:center;gap:9px}
.dopt:active,.dopt.sel{background:rgba(32,73,137,.05);border-color:var(--p);color:var(--p)}
.danon{display:flex;align-items:center;gap:8px;padding:11px;background:rgba(59,215,126,.07);border-radius:var(--rm)}
.achk{width:19px;height:19px;border-radius:5px;background:var(--a1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:#fff}
.atxt{font-size:11px;color:#16a34a;font-weight:500}
.upload-area{border:2px dashed var(--g200);border-radius:var(--rmd);padding:16px;text-align:center;cursor:pointer;transition:all .2s;margin-top:10px}
.upload-area:active{border-color:var(--p);background:rgba(32,73,137,.03)}
.upload-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.upload-thumb{width:60px;height:60px;border-radius:8px;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--g200)}
.upload-thumb-name{font-size:9px;color:var(--g600);text-align:center;margin-top:2px;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.termo-box{background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.15);border-radius:var(--rm);padding:12px;margin-top:12px;font-size:11px;color:var(--g600);line-height:1.6}
.termo-check{display:flex;align-items:flex-start;gap:8px;margin-top:10px;cursor:pointer}
.termo-checkbox{width:18px;height:18px;border-radius:4px;border:2px solid var(--g400);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.termo-checkbox.checked{background:var(--p);border-color:var(--p);color:#fff;font-size:11px}
.termo-txt{font-size:11px;color:var(--g600);line-height:1.5}
.flbl{font-size:12px;font-weight:600;color:var(--g600);margin-bottom:5px;display:block;margin-top:12px}
.fta{width:100%;padding:11px;border:1.5px solid var(--g200);border-radius:var(--rm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--g800);resize:none;min-height:100px;background:var(--g50);transition:border-color .2s}
.fta:focus{outline:none;border-color:var(--p);background:#fff}.fta.erro{border-color:var(--danger)}
.btnp{width:100%;padding:13px;background:var(--p);color:#fff;border:none;border-radius:var(--rmd);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;transition:all .2s}
.btnp:active{transform:scale(.98);background:var(--pd)}
.btno{width:100%;padding:12px;background:transparent;color:var(--p);border:1.5px solid var(--p);border-radius:var(--rmd);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:7px;transition:all .2s}
.btno:active{background:rgba(32,73,137,.05)}
.btnd{width:100%;padding:12px;background:transparent;color:var(--danger);border:1.5px solid var(--danger);border-radius:var(--rmd);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:7px}
.prog-bar{height:6px;background:var(--g100);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.alerta-box{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:var(--rm);padding:10px 12px;font-size:11px;color:#dc2626;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.info-box{background:rgba(32,73,137,.05);border:1px solid rgba(32,73,137,.12);border-radius:var(--rm);padding:10px 12px;font-size:11px;color:var(--p);margin-bottom:8px}
.ok-box{background:rgba(59,215,126,.08);border:1px solid rgba(59,215,126,.2);border-radius:var(--rm);padding:10px 12px;font-size:11px;color:#16a34a;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.film-area{background:var(--g50);border-radius:var(--rmd);overflow:hidden;margin-bottom:14px;position:relative;min-height:200px;display:flex;align-items:center;justify-content:center;border:2px dashed var(--g200)}
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--g800);color:#fff;padding:11px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;max-width:300px;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .3s ease forwards}.fu2{animation:fu .3s .07s ease both}.fu3{animation:fu .3s .14s ease both}
.carousel{display:flex;overflow-x:auto;gap:12px;scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.carousel::-webkit-scrollbar{display:none}
.carousel-slide{min-width:calc(100% - 0px);scroll-snap-align:start;background:#fff;border-radius:var(--rl);padding:16px;box-shadow:var(--s1);border:1px solid var(--g100)}
.carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:8px;margin-bottom:14px}
.cdot{width:6px;height:6px;border-radius:50%;background:var(--g200);cursor:pointer;transition:all .2s}
.cdot.active{background:var(--p);width:18px;border-radius:3px}
.mconta{position:fixed;bottom:78px;right:8px;background:#fff;border-radius:var(--rl);box-shadow:var(--s3);border:0.5px solid var(--g100);overflow:hidden;z-index:300;min-width:190px;display:none;transform:translateY(10px);transition:all .2s}
.mconta.open{display:block;transform:translateY(0)}
.mco-item{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;border-bottom:0.5px solid var(--g100);font-size:13px;font-weight:500;color:var(--g800);transition:background .15s}
.mco-item:last-child{border-bottom:none}.mco-item:active{background:var(--g50)}
.mco-overlay{position:fixed;inset:0;z-index:299;display:none}.mco-overlay.open{display:block}
</style>
</head>
<body>
<div id="splash" class="screen active">
  <div class="sb"><div class="sc sc1"></div><div class="sc sc2"></div></div>
  <div class="splash-inner">
    <div style="margin:0 auto 1.5rem;text-align:center">
      <svg width="170" height="58" viewBox="0 0 170 58" fill="none">
        <g transform="translate(0,3)">
          <path d="M24 4C11 4 2 13.5 2 26S11 48 24 48" stroke="url(#g1)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
          <path d="M19 13C12.5 13 8 19 8 26S12.5 39 19 39" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path d="M28 17C28 17 23 23.5 23 27.5C23 31.5 25.5 34 28.5 34C31.5 34 34 31.5 34 27.5C34 23.5 29 17 28 17Z" fill="url(#g1)"/>
          <path d="M5 42C12 49 21 52 30 50" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" fill="none"/>
          <defs><linearGradient id="g1" x1="0" y1="0" x2="34" y2="52" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#83EDA3"/><stop offset="100%" stop-color="#3BD77E"/></linearGradient></defs>
        </g>
        <text x="50" y="31" font-family="Plus Jakarta Sans,sans-serif" font-size="22" font-weight="800" fill="white">capital</text>
        <text x="51" y="47" font-family="Plus Jakarta Sans,sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.55)">saúde digital</text>
      </svg>
    </div>
    <div class="ss">Gestão contínua de saúde ocupacional</div>
    <div class="pl-label">Selecione seu perfil</div>
    <div class="pcards">
      <div class="pcard" onclick="entrar('colaborador')"><div class="pi pi-c">🧑‍🏭</div><div class="pinfo"><div class="pnome">Colaborador</div><div class="pdesc">Bem-estar, carteirinha e benefícios</div></div><div class="parr">›</div></div>
      <div class="pcard" onclick="entrar('rh')"><div class="pi pi-r">👔</div><div class="pinfo"><div class="pnome">RH / Gestor</div><div class="pdesc">Gestão da empresa e equipe</div></div><div class="parr">›</div></div>
    </div>
  </div>
</div>

<div id="app" class="screen">
  <div class="hdr">
    <div class="htop">
      <div style="display:flex;align-items:center;gap:8px">
        <svg width="115" height="30" viewBox="0 0 115 30" fill="none">

function renderMoodInline(step){
  var etapas=[{t:'Minha energia hoje:',opts:['😴 Esgotado','😕 Baixo','😐 Ok','🙂 Bem','😄 Ótimo'],k:'energia'},{t:'Meu humor hoje:',opts:['😞 Muito mal','😕 Mal','😐 Regular','🙂 Bem','😄 Ótimo'],k:'humor'},{t:'Pressão no trabalho:',opts:['😌 Nenhuma','🙂 Leve','😐 Moderada','😟 Alta','😰 Insustentável'],k:'pressao'}];
  if(step>=etapas.length)return'';
  var e=etapas[step];
  var prog='<div style="display:flex;gap:5px;margin-bottom:10px;position:relative;z-index:1">'+[0,1,2].map(function(i){return'<div style="height:3px;flex:1;border-radius:2px;background:'+(i<=step?'var(--a1)':'rgba(255,255,255,.2)')+'"></div>'}).join('')+'</div>';
  return prog+'<div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:8px;position:relative;z-index:1">'+e.t+'</div><div class="mopts" id="mood-opts-'+step+'">'+e.opts.map(function(o,i){return'<div class="mopt" onclick="respMoodInline('+step+',\''+e.k+'\','+i+',this)">'+o+'</div>'}).join('')+'</div>'
}

function respMoodInline(step,k,v,btn){
  document.querySelectorAll('#mood-opts-'+step+' .mopt').forEach(function(b){b.classList.remove('sel')});
  btn.classList.add('sel');moodData[k]=v;
  setTimeout(function(){
    var next=step+1;
    if(next>=3){moodBloqueado=true;document.getElementById('mood-inline').innerHTML='<div style="background:rgba(255,255,255,.15);border-radius:12px;padding:12px;text-align:center;font-size:13px;color:rgba(255,255,255,.9)">✓ Obrigado pelo feedback de hoje! 💚<br><span style="font-size:11px;opacity:.7">Disponível novamente amanhã às 9h</span></div>';document.getElementById('mood-sub').textContent='Respondido hoje';return}
    document.getElementById('mood-inline').innerHTML=renderMoodInline(next)
  },350)
}

function selDen(btn){document.querySelectorAll('.dopt').forEach(function(b){b.classList.remove('sel')});btn.classList.add('sel');denOpt=btn.textContent}

function toggleTermo(){termoAceito=!termoAceito;var cb=document.getElementById('termo-check-box');cb.classList.toggle('checked',termoAceito);cb.textContent=termoAceito?'✓':'';document.getElementById('termo-erro').style.display='none'}

function addProvas(input){
  if(!input.files)return;
  var preview=document.getElementById('den-provas-preview');
  for(var i=0;i<input.files.length;i++){
    var f=input.files[i];provas.push(f.name);
    var div=document.createElement('div');div.style.textAlign='center';
    var ico=f.type.startsWith('image')?'🖼️':f.type.startsWith('video')?'🎥':f.type.startsWith('audio')?'🎵':'📄';
    div.innerHTML='<div class="upload-thumb">'+ico+'</div><div class="upload-thumb-name">'+f.name.slice(0,8)+'...</div>';
    preview.appendChild(div)
  }
}

function envDen(){
  var desc=document.getElementById('den-desc').value.trim();var ok=true;
  if(!desc){document.getElementById('den-desc').classList.add('erro');document.getElementById('den-desc-erro').style.display='block';ok=false}else{document.getElementById('den-desc').classList.remove('erro');document.getElementById('den-desc-erro').style.display='none'}
  if(!termoAceito){document.getElementById('termo-erro').style.display='block';ok=false}
  if(!ok)return;
  toast('Denúncia enviada com segurança ✓');denOpt=null;termoAceito=false;provas=[];
  setTimeout(function(){renderTab('mais')},1800)
}

function prevFilm(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];var url=URL.createObjectURL(file);
  var v=document.getElementById('film-vid-prev');v.src=url;v.style.display='block';document.getElementById('film-placeholder').style.display='none';
  setTimeout(function(){
    var rv=document.getElementById('film-rev-vid');rv.src=url;
    document.getElementById('film-rev-nome').textContent=(filmSel?filmSel.posto+' · '+filmSel.local:'');
    v.onloadedmetadata=function(){var dur=Math.round(v.duration);document.getElementById('film-rev-dur').textContent='Duração: '+Math.floor(dur/60)+'min '+dur%60+'s · '+(file.size/1024/1024).toFixed(1)+'MB'};
    document.getElementById('film-step2').style.display='none';document.getElementById('film-step3').style.display='block'
  },700)
}
